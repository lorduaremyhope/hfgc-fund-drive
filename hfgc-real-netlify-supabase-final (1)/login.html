<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - HFGC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="login-page">
    <section class="card login-card">
      <h1>HFGC Admin Login</h1>
      <div id="loginError" class="danger" style="display:none;">Invalid login.</div>
      <form id="loginForm">
        <label>Username <input id="username" required></label>
        <label>Password <input id="password" type="password" required></label>
        <button type="submit">Login</button>
      </form>
      <p><a href="index.html">Back to Public Page</a></p>
    </section>
  </main>
  <script src="app.js"></script>
  <script>initLoginPage();</script>
</body>
</html>
